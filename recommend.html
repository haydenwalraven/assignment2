<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Recommendation - Hayden's Food Finder</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Hayden's Food Finder</h1>
        <p>Find the Best Restaurant for You</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="restaurants.html">Restaurants</a></li>
            <li><a href="recommend.html" class="active">Recommendations</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="reservation.html">Reservation</a></li>
        </ul>
    </nav>

    <section>
        <h2>Restaurant Recommendation</h2>

        <form id="recommendForm">

            <label for="diet">Dietary Preference:</label>
            <select id="diet" required>
                <option value="">Select</option>
                <option value="None">None</option>
                <option value="Halal">Halal</option>
                <option value="Vegan">Vegan</option>
            </select>

            <br><br>

            <label for="budget">Budget Range:</label>
            <select id="budget" required>
                <option value="">Select</option>
                <option value="Low">$20 - $35</option>
                <option value="Medium">$35 - $50</option>
                <option value="High">$50+</option>
            </select>

            <br><br>

            <label for="purpose">Dining Purpose:</label>
            <select id="purpose" required>
                <option value="">Select</option>
                <option value="Family">Family</option>
                <option value="Date">Date</option>
                <option value="Business">Business</option>
            </select>

            <br><br>

            <button type="button" onclick="recommendRestaurant()">
                Get Recommendation
            </button>

        </form>

        <br>

        <div id="result"></div>

    </section>

    <footer>
        <p>&copy; 2026 Hayden's Food Finder. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>

</body>
</html>
