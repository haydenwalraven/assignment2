<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Hayden's Food Finder</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Hayden's Food Finder</h1>
        <p>Create Your Account</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="restaurants.html">Restaurants</a></li>
            <li><a href="recommend.html">Recommendations</a></li>
            <li><a href="register.html" class="active">Register</a></li>
            <li><a href="reservation.html">Reservation</a></li>
        </ul>
    </nav>

    <section>
        <h2>Register</h2>

        <form id="registerForm">

            <label for="username">Username:</label>
            <input type="text" id="username" required>

            <br><br>

            <label for="email">Email Address:</label>
            <input type="email" id="email" required>

            <br><br>

            <label for="phone">Phone Number:</label>
            <input type="text" id="phone" required>

            <br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" required>

            <br><br>

            <label for="confirmPassword">Confirm Password:</label>
            <input type="password" id="confirmPassword" required>

            <br><br>

            <label>Gender:</label>

            <input type="radio" name="gender" value="Male">
            Male

            <input type="radio" name="gender" value="Female">
            Female

            <input type="radio" name="gender" value="Other">
            Other

            <br><br>

            <label for="dietary">Dietary Preference:</label>
            <select id="dietary">
                <option value="">Select</option>
                <option value="None">None</option>
                <option value="Vegan">Vegan</option>
                <option value="Halal">Halal</option>
            </select>

            <br><br>

            <label for="country">Country / Region:</label>
            <select id="country" required>
                <option value="">Select</option>
                <option value="Australia">Australia</option>
                <option value="New Zealand">New Zealand</option>
                <option value="Singapore">Singapore</option>
            </select>

            <br><br>

            <button type="submit">
                Register
            </button>

            <p id="registerError"></p>

        </form>

    </section>

    <footer>
        <p>&copy; 2026 Hayden's Food Finder. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>

</body>
</html>
